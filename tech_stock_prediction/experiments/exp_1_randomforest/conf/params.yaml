%YAML 1.2
---

# Which universe (see config/stock_universes.py) TICKERS below belongs to.
# Set via set_universe.py, not by hand. Informational only for this
# experiment (Random Forest is no longer the final model), but the data
# acquisition/feature/split steps here are still reused by exp_2_lstm.
UNIVERSE: "original_tech"
DATA_ACQUISITION:
  START_DATE: '2019-01-01'
  RAW_DATA_FILE: 'data/raw/tech_stocks_raw.csv'
  TICKERS: ['AAPL', 'MSFT', 'NVDA', 'AMD', 'GOOGL', 'META', 'AMZN', 'TSLA', 'INTC', 'ADBE']
  MARKET_TICKERS: ['QQQ', 'SPY']

DATA_PREP:
  FEATURE_DATA_FILE: 'data/processed/tech_stocks_features.csv'
  TRAIN_FILE: 'data/processed/train.csv'
  VALIDATION_FILE: 'data/processed/validation.csv'
  TEST_FILE: 'data/processed/test.csv'
  TRAIN_RATIO: 0.70
  VALIDATION_RATIO: 0.15
  TEST_RATIO: 0.15
  FEATURE_PATH: 'scripts/03_pre_split_prep/features.txt'

MODELING:
  TARGET: 'Target'
  MODEL_FILE: 'models/random_forest_tuned_market_features.pkl'
  N_ESTIMATORS: 100
  MAX_DEPTH: 5
  RANDOM_STATE: 42

BACKTEST:
  PREDICTIONS_FILE: 'data/processed/test_predictions.csv'
  RESULTS_FILE: 'data/processed/backtest_results.csv'
