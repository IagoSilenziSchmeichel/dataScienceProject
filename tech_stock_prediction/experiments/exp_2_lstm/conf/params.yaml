# LSTM experiment configuration

DATA:
  # We reuse the processed Random Forest data from experiment exp_1_randomforest.
  # This makes the LSTM comparable to the Random Forest model.
  TRAIN_FILE: "../exp_1_randomforest/data/processed/train.csv"
  VALIDATION_FILE: "../exp_1_randomforest/data/processed/validation.csv"
  TEST_FILE: "../exp_1_randomforest/data/processed/test.csv"

  # LSTM feature list.
  # Stored inside exp_2_lstm so the LSTM pipeline does not depend on archived
  # or removed Random Forest script folders.
  FEATURE_PATH: "conf/lstm_features.txt"

  # Output file for created LSTM sequences
  SEQUENCE_FILE: "data/processed/lstm_sequences.npz"

  # Scaler for LSTM input features.
  # It is fitted only on train data and then reused for validation/test.
  SCALER_FILE: "models/lstm_feature_scaler.pkl"

  # Metadata for the test sequences, needed for evaluation and backtesting
  TEST_METADATA_FILE: "data/processed/lstm_test_metadata.csv"

MARKET:
  QQQ_TICKER: "QQQ"
  SPY_TICKER: "SPY"
  VIX_TICKER: "^VIX"

MODEL:
  TARGET: "Target"

  # Number of past days used as one input sequence
  SEQUENCE_LENGTH: 20

  HIDDEN_SIZE: 64

  # With NUM_LAYERS = 1, PyTorch does not apply LSTM dropout internally.
  # With NUM_LAYERS > 1, dropout is used between LSTM layers.
  NUM_LAYERS: 1
  DROPOUT: 0.2

  EPOCHS: 20
  BATCH_SIZE: 32
  LEARNING_RATE: 0.001
  RANDOM_STATE: 42
  PREDICTION_THRESHOLD: 0.50
  THRESHOLDS: [0.50, 0.55, 0.60, 0.65, 0.70]
  TOP_K_VALUES: [1, 2, 3, 4, 5]

  MODEL_FILE: "models/lstm_model.pth"

RESULTS:
  PREDICTIONS_FILE: "data/processed/lstm_test_predictions.csv"
  BACKTEST_FILE: "data/processed/lstm_backtest_results.csv"
  STANDARD_RESULTS_FILE: "data/processed/lstm_standard_results.csv"
  STANDARD_TOP_K_FILE: "data/processed/lstm_standard_top_k_results.csv"
  THRESHOLD_RESULTS_FILE: "data/processed/lstm_threshold_results.csv"
  TUNING_RESULTS_FILE: "data/processed/lstm_tuning_results.csv"
  TUNED_FINAL_RESULTS_FILE: "data/processed/lstm_tuned_final_results.csv"
  TUNED_TOP_K_RESULTS_FILE: "data/processed/lstm_tuned_top_k_results.csv"
  COMPARISON_SUMMARY_FILE: "data/processed/lstm_model_comparison_summary.csv"
  OUTPERFORMANCE_PREDICTIONS_FILE: "data/processed/lstm_outperformance_predictions.csv"
  OUTPERFORMANCE_RESULTS_FILE: "data/processed/lstm_outperformance_results.csv"
  OUTPERFORMANCE_TOP_K_FILE: "data/processed/lstm_outperformance_top_k_results.csv"
  OUTPERFORMANCE_COMPARISON_FILE: "data/processed/lstm_outperformance_comparison_summary.csv"
  FEATURE_ABLATION_SUMMARY_FILE: "data/processed/lstm_feature_ablation_summary.csv"
  FEATURE_ABLATION_RETURNS_PLOT: "plots/lstm_feature_ablation_returns.png"
  FEATURE_ABLATION_SHARPE_PLOT: "plots/lstm_feature_ablation_sharpe.png"
  FEATURE_ABLATION_DRAWDOWN_PLOT: "plots/lstm_feature_ablation_drawdown.png"
  FEATURE_ABLATION_TOP_K_PLOT: "plots/lstm_feature_ablation_top_k.png"
  ROBUSTNESS_WALK_FORWARD_FILE: "data/processed/lstm_robustness_walk_forward_summary.csv"
  ROBUSTNESS_SENSITIVITY_FILE: "data/processed/lstm_robustness_sensitivity_summary.csv"
  ROBUSTNESS_CONCENTRATION_FILE: "data/processed/lstm_robustness_concentration_summary.csv"
  ROBUSTNESS_REPORT_FILE: "reports/lstm_robustness_report.md"
  ROBUSTNESS_WALK_FORWARD_PLOT: "plots/lstm_robustness_walk_forward_difference.png"
  ROBUSTNESS_TOP_K_PLOT: "plots/lstm_robustness_top_k_sensitivity.png"
  ROBUSTNESS_COST_PLOT: "plots/lstm_robustness_cost_sensitivity.png"
  ROBUSTNESS_CONCENTRATION_PLOT: "plots/lstm_robustness_concentration.png"
